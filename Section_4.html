<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vGYYAN Class Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .selected {
      transform: scale(1.05);
      border: 2px solid #22c55e;
      background-color: #f0fdf4;
    }
  </style>
</head>
<body class="min-h-screen overflow-x-auto" style="background-color: #f5f5db;">
  <div class="flex">
    <!-- Left Column -->
    <div class="w-80 flex flex-col pl-10 pr-6 py-4 space-y-4">
      <div id="vgyaan-box" class="bg-white rounded-xl p-4 shadow-md ring-2 ring-green-300 selected cursor-pointer">
        <h2 class="text-lg font-bold text-green-600">vGYYAN</h2>
        <div class="mt-2 text-sm text-gray-600">Video placeholder here to explain features.</div>
      </div>

      <template id="class-template">
        <div class="bg-white rounded-xl p-4 shadow-md cursor-pointer transition-transform duration-200">
          <h3 class="font-semibold">Class <span class="class-num"></span></h3>
        </div>
      </template>

      <div id="class-list" class="space-y-4"></div>
    </div>

    <!-- Dynamic Panels -->
    <div id="expansion-area" class="flex flex-grow p-4 space-x-6 overflow-x-auto"></div>
  </div>

  <script>
    const classes = Array.from({ length: 10 }, (_, i) => i + 1);
    const subjects = ['English', 'Science', 'SST'];
    const chapters = Array.from({ length: 5 }, (_, i) => `Chapter ${i + 1}`);
    const actions = ['Video', 'Summary', 'Questions'];

    const classList = document.getElementById('class-list');
    const template = document.getElementById('class-template');
    const expansionArea = document.getElementById('expansion-area');
    const vgyaanBox = document.getElementById('vgyaan-box');

    let selectedClassEl = null;
    let selectedSubjectEl = null;

    function clearRightPanels(fromLevel) {
      while (expansionArea.children.length > fromLevel) {
        expansionArea.removeChild(expansionArea.lastChild);
      }
    }

    function toggleSelection(el, currentTracker) {
      if (currentTracker.current && currentTracker.current !== el) {
        currentTracker.current.classList.remove('selected');
      }
      if (currentTracker.current === el) {
        el.classList.toggle('selected');
        currentTracker.current = el.classList.contains('selected') ? el : null;
      } else {
        el.classList.add('selected');
        currentTracker.current = el;
      }
    }

    function createPanel(items, onClick, level, compact = false, tracker = null) {
      clearRightPanels(level);

      const panel = document.createElement('div');
      panel.className = 'bg-white rounded-xl p-4 shadow-md space-y-2 transition-all duration-200';
      panel.style.minWidth = '300px';
      panel.style.maxWidth = '340px';
      if (compact) panel.classList.add('h-fit');

      items.forEach(item => {
        const el = document.createElement('div');
        el.textContent = item;
        el.className = 'cursor-pointer hover:text-green-600 px-2 py-1 rounded-md transition-transform';
        el.onclick = () => onClick(el, item, level + 1);
        panel.appendChild(el);
      });

      expansionArea.appendChild(panel);
    }

    function resetSelections() {
      selectedClassEl = selectedSubjectEl = null;
      clearRightPanels(0);
      document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
    }

    vgyaanBox.onclick = () => {
      resetSelections();
      console.log("vGYYAN selected. Video should play here.");
    };

    function buildClassModules() {
      classes.forEach(cls => {
        const clone = template.content.cloneNode(true);
        const box = clone.querySelector('div');
        const num = clone.querySelector('.class-num');
        num.textContent = cls;

        box.onclick = () => {
          if (selectedClassEl && selectedClassEl !== box) selectedClassEl.classList.remove('selected');
          selectedClassEl = box.classList.toggle('selected') ? box : null;
          if (!selectedClassEl) return resetSelections();

          const subjectTracker = { current: null };
          createPanel(subjects, (subjEl, subject, level1) => {
            toggleSelection(subjEl, subjectTracker);
            if (!subjectTracker.current) {
              clearRightPanels(level1);
              return;
            }

            const chapterTracker = { current: null };
            createPanel(chapters, (chapEl, chapter, level2) => {
              toggleSelection(chapEl, chapterTracker);
              clearRightPanels(level2);

              if (!chapterTracker.current) return;

              const actionTracker = { current: null };
              createPanel(actions, (actionEl, action, level3) => {
                toggleSelection(actionEl, actionTracker);
                clearRightPanels(level3);

                if (!actionTracker.current) return;

                const displayPanel = document.createElement('div');
                displayPanel.className = 'min-w-[400px] bg-white p-4 rounded-xl shadow';
                displayPanel.innerHTML = `
                  <h3 class="text-lg font-bold mb-2">${chapter} - ${action}</h3>
                  <p class="text-sm text-gray-500">[${action} content placeholder]</p>
                `;
                expansionArea.appendChild(displayPanel);
              }, level2 + 1, true, actionTracker);
            }, level1 + 1, true, chapterTracker);
          }, 1, true, subjectTracker);
        };

        classList.appendChild(clone);
      });
    }

    buildClassModules();
  </script>
</body>
</html>
