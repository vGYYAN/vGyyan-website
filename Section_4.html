<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vGYYAN Class Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .selected {
      transform: scale(1.05);
      border: 2px solid #22c55e;
      background-color: #f0fdf4;
    }
  </style>
</head>
<body class="min-h-screen overflow-x-auto" style="background-color: #fff8cd;">
  <div class="flex">
    <!-- Left Column -->
    <div class="w-80 flex flex-col pl-10 pr-6 py-4 space-y-4">
      <!-- vGYYAN Module -->
      <div id="vgyaan-box" class="bg-white rounded-xl p-4 shadow-md ring-2 ring-green-300 selected cursor-pointer">
        <h2 class="text-lg font-bold text-green-600">vGYYAN</h2>
        <div class="mt-2 text-sm text-gray-600">Video placeholder here to explain features.</div>
      </div>

      <!-- Class Modules -->
      <template id="class-template">
        <div class="bg-white rounded-xl p-4 shadow-md cursor-pointer transition-transform duration-200">
          <h3 class="font-semibold">Class <span class="class-num"></span></h3>
        </div>
      </template>

      <div id="class-list" class="space-y-4"></div>
    </div>

    <!-- Right Expansion Panels -->
    <div id="expansion-area" class="flex flex-grow p-4 space-x-6 overflow-x-auto"></div>
  </div>

  <script>
    const classes = Array.from({ length: 10 }, (_, i) => i + 1);
    const subjects = ['English', 'Science', 'SST'];
    const chapters = Array.from({ length: 5 }, (_, i) => `Chapter ${i + 1}`);
    const actions = ['Video', 'Summary', 'Questions'];

    const classList = document.getElementById('class-list');
    const template = document.getElementById('class-template');
    const expansionArea = document.getElementById('expansion-area');
    const vgyaanBox = document.getElementById('vgyaan-box');

    let selectedClassEl = null;
    let selectedSubjectEl = null;
    let selectedChapterEl = null;
    let selectedActionEl = null;

    function clearPanels(fromLevel = 0) {
      while (expansionArea.children.length > fromLevel) {
        expansionArea.removeChild(expansionArea.lastChild);
      }
    }

    function toggleSelection(el, selectedRef) {
      if (selectedRef && selectedRef !== el) {
        selectedRef.classList.remove('selected');
      }
      if (selectedRef === el) {
        el.classList.toggle('selected');
        return el.classList.contains('selected') ? el : null;
      } else {
        el.classList.add('selected');
        return el;
      }
    }

    function createPanel(items, onClick, level, compact = false, selectedTracker = null) {
      clearPanels(level);

      const panel = document.createElement('div');
      panel.className = `bg-white rounded-xl p-4 shadow-md space-y-2 transition-all duration-200`;
      panel.style.minWidth = '300px';
      panel.style.maxWidth = '340px';
      if (compact) panel.classList.add('h-fit');

      items.forEach(item => {
        const el = document.createElement('div');
        el.textContent = item;
        el.className = 'cursor-pointer hover:text-green-600 px-2 py-1 rounded-md transition-transform';
        el.onclick = () => {
          if (selectedTracker) {
            const selectedEl = toggleSelection(el, selectedTracker.current);
            selectedTracker.current = selectedEl;
          }

          clearPanels(level + 1);
          onClick(el, item, level + 1);
        };
        panel.appendChild(el);
      });

      expansionArea.appendChild(panel);
    }

    function resetSelections() {
      [selectedClassEl, selectedSubjectEl, selectedChapterEl, selectedActionEl].forEach(el => {
        if (el) el.classList.remove('selected');
      });
      selectedClassEl = selectedSubjectEl = selectedChapterEl = selectedActionEl = null;
    }

    vgyaanBox.onclick = () => {
      resetSelections();
      clearPanels(0);
    };

    function buildClassModules() {
      classes.forEach(cls => {
        const clone = template.content.cloneNode(true);
        const box = clone.querySelector('div');
        const num = clone.querySelector('.class-num');
        num.textContent = cls;

        box.onclick = () => {
          selectedClassEl = toggleSelection(box, selectedClassEl);
          if (selectedClassEl) {
            const subjectTracker = { current: null };
            const chapterTracker = { current: null };
            const actionTracker = { current: null };

            createPanel(subjects, (subjectEl, subject, level1) => {
              subjectTracker.current = toggleSelection(subjectEl, subjectTracker.current);
              if (!subjectTracker.current) return;

              createPanel(chapters, (chapterEl, chapter, level2) => {
                chapterTracker.current = toggleSelection(chapterEl, chapterTracker.current);
                if (!chapterTracker.current) return;

                createPanel(actions, (actionEl, action, level3) => {
                  actionTracker.current = toggleSelection(actionEl, actionTracker.current);
                  if (!actionTracker.current) return;

                  const contentPanel = document.createElement('div');
                  contentPanel.className = 'min-w-[400px] bg-white p-4 rounded-xl shadow';
                  contentPanel.innerHTML = `
                    <h3 class="text-lg font-bold mb-2">${chapter} - ${action}</h3>
                    <p class="text-sm text-gray-500">[${action} content placeholder]</p>
                  `;
                  expansionArea.appendChild(contentPanel);
                }, level2 + 1, true, actionTracker);

              }, level1 + 1, true, chapterTracker);

            }, 0, true, subjectTracker);
          } else {
            clearPanels(0);
          }
        };

        classList.appendChild(clone);
      });
    }

    buildClassModules();
  </script>
</body>
</html>
