<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vGYYAN Class Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen overflow-x-auto" style="background: linear-gradient(135deg, #f1fdf6 0%, #fdfdfd 100%), linear-gradient(225deg, #d6ecff 0%, transparent 10%), #ffffff;">
  <div class="flex">
    <!-- Left Column -->
    <div class="w-64 flex flex-col p-4 space-y-4">
      <!-- vGYYAN Module -->
      <div class="bg-white rounded-xl p-4 shadow-md ring-2 ring-green-300">
        <h2 class="text-lg font-bold text-green-600">vGYYAN</h2>
        <div class="mt-2 text-sm text-gray-600">Video placeholder here to explain features.</div>
      </div>

      <!-- Class Modules -->
      <template id="class-template">
        <div class="bg-white rounded-xl p-4 shadow-md cursor-pointer">
          <h3 class="font-semibold">Class <span class="class-num"></span></h3>
        </div>
      </template>

      <div id="class-list"></div>
    </div>

    <!-- Dynamic Expansion Area -->
    <div id="expansion-area" class="flex flex-grow p-4 space-x-4 overflow-x-auto"></div>
  </div>

  <script>
    const classes = Array.from({ length: 10 }, (_, i) => i + 1);
    const subjects = ['English', 'Science', 'SST'];
    const chapters = Array.from({ length: 5 }, (_, i) => `Chapter ${i + 1}`);
    const actions = ['Video', 'Summary', 'Questions'];

    const classList = document.getElementById('class-list');
    const template = document.getElementById('class-template');
    const expansionArea = document.getElementById('expansion-area');

    function clearRightPanels(fromLevel) {
      while (expansionArea.children.length > fromLevel) {
        expansionArea.removeChild(expansionArea.lastChild);
      }
    }

    function createPanel(items, onClick, level) {
      clearRightPanels(level);
      const panel = document.createElement('div');
      panel.className = 'w-48 bg-white rounded-xl p-4 shadow-md space-y-2';

      items.forEach(item => {
        const el = document.createElement('div');
        el.textContent = item;
        el.className = 'cursor-pointer hover:text-green-600';
        el.onclick = () => onClick(item, level + 1);
        panel.appendChild(el);
      });

      expansionArea.appendChild(panel);
    }

    function buildClassModules() {
      classes.forEach(cls => {
        const clone = template.content.cloneNode(true);
        clone.querySelector('.class-num').textContent = cls;
        clone.querySelector('div').onclick = () => {
          createPanel(subjects, (subject, level) => {
            createPanel(chapters, (chapter, level2) => {
              createPanel(actions, () => {}, level2 + 1);
            }, level);
          }, 0);
        };
        classList.appendChild(clone);
      });
    }

    buildClassModules();
  </script>
</body>
</html>
