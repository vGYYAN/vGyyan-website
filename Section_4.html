  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vGYYAN Class Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .selected {
      transform: scale(1.05);
      border: 2px solid #22c55e;
      background-color: #f0fdf4;
    }
  </style>
</head>
<body class="min-h-screen overflow-x-auto" style="background-color: #fff2db;"> 
<!-- <body class="min-h-screen overflow-x-auto" style="background: linear-gradient(135deg, #f1fdf6 0%, #fdfdfd 100%), linear-gradient(225deg, #d6ecff 0%, transparent 10%), #ffffff;"> -->
  <div class="flex">
    <!-- Left Column -->
    <div class="w-80 flex flex-col pl-10 pr-6 py-4 space-y-4">
      <!-- vGYYAN Module -->
      <div id="vgyaan-box" class="bg-white rounded-xl p-4 shadow-md ring-2 ring-green-300 selected cursor-pointer">
        <h2 class="text-lg font-bold text-green-600">vGYYAN</h2>
        <div class="mt-2 text-sm text-gray-600">Video placeholder here to explain features.</div>
      </div>

      <!-- Class Modules -->
      <template id="class-template">
        <div class="bg-white rounded-xl p-4 shadow-md cursor-pointer transition-transform duration-200">
          <h3 class="font-semibold">Class <span class="class-num"></span></h3>
        </div>
      </template>

      <div id="class-list" class="space-y-4"></div>
    </div>

    <!-- Dynamic Expansion Area -->
    <div id="expansion-area" class="flex flex-grow p-4 space-x-6 overflow-x-auto"></div>
  </div>

  <script>
    const classes = Array.from({ length: 10 }, (_, i) => i + 1);
    const subjects = ['English', 'Science', 'SST'];
    const chapters = Array.from({ length: 5 }, (_, i) => `Chapter ${i + 1}`);
    const actions = ['Video', 'Summary', 'Questions'];

    const classList = document.getElementById('class-list');
    const template = document.getElementById('class-template');
    const expansionArea = document.getElementById('expansion-area');
    const vgyaanBox = document.getElementById('vgyaan-box');

    let selectedClassEl = null;
    let selectedSubjectEl = null;
    let selectedChapterEl = null;
    let selectedActionEl = null;

    function clearRightPanels(fromLevel) {
      while (expansionArea.children.length > fromLevel) {
        expansionArea.removeChild(expansionArea.lastChild);
      }
    }

    function toggleSelection(el, currentSelected) {
      if (currentSelected && currentSelected !== el) {
        currentSelected.classList.remove('selected');
      }
      if (currentSelected === el) {
        el.classList.toggle('selected');
        return el.classList.contains('selected') ? el : null;
      } else {
        el.classList.add('selected');
        return el;
      }
    }

    function createPanel(items, onClick, level, compact = false, selectTracker = null, customWidth = {}) {
      clearRightPanels(level);
    
      const minW = customWidth.min || '300px';
      const maxW = customWidth.max || '340px';
    
      const panel = document.createElement('div');/*
      panel.className = `min-w-[${minW}] max-w-[${maxW}] bg-white rounded-xl p-4 shadow-md space-y-2 transition-all duration-200`;*/
      panel.className = `bg-white rounded-xl p-4 shadow-md space-y-2 transition-all duration-200`;
      panel.style.minWidth = minW;
      panel.style.maxWidth = maxW;
  
      if (compact) {
        panel.classList.add('h-fit');
      }
    
      items.forEach(item => {
        const el = document.createElement('div');
        el.textContent = item;
        el.className = 'cursor-pointer hover:text-green-600 px-2 py-1 rounded-md transition-transform';
        el.onclick = () => {
          if (selectTracker) {
            const selectedEl = toggleSelection(el, selectTracker.current);
            selectTracker.current = selectedEl;
          }
          // 💥 This is the key: clear ALL panels beyond this point, every time
          clearRightPanels(level + 1);
          onClick(el, item, level + 1);
        };
        panel.appendChild(el);
      });
    
      expansionArea.appendChild(panel);
    }

    function resetAllSelections() {
      [selectedClassEl, selectedSubjectEl, selectedChapterEl, selectedActionEl].forEach(el => {
        if (el) el.classList.remove('selected');
      });
      selectedClassEl = selectedSubjectEl = selectedChapterEl = selectedActionEl = null;
    }

    vgyaanBox.onclick = () => {
      resetAllSelections();
      clearRightPanels(0);
      console.log("vGYYAN selected. Video should play here.");
    };

    function buildClassModules() {
      classes.forEach(cls => {
        const clone = template.content.cloneNode(true);
        const box = clone.querySelector('div');
        const num = clone.querySelector('.class-num');
        num.textContent = cls;
        
        vgyaanBox.classList.remove('selected');

        box.onclick = () => {
          selectedClassEl = toggleSelection(box, selectedClassEl);
          if (selectedClassEl) {
            selectedSubjectEl = null;
            selectedChapterEl = null;
            selectedActionEl = null;

            createPanel(subjects, (subjEl, subject, level) => {
              selectedSubjectEl = toggleSelection(subjEl, selectedSubjectEl);
            
              if (!selectedSubjectEl) {
                clearRightPanels(level);
                return;
              }
              createPanel(chapters, (chapEl, chapter, level2) => {
                // Always clear any panels to the right of chapter
                clearRightPanels(level2 + 1);
              
                // Handle deselection of previous chapter
                if (selectedChapterEl && selectedChapterEl !== chapEl) {
                  selectedChapterEl.classList.remove('selected');
                }
              
                // Toggle current selection
                if (selectedChapterEl === chapEl) {
                  chapEl.classList.toggle('selected');
                  selectedChapterEl = chapEl.classList.contains('selected') ? chapEl : null;
              
                  // If deselected, also clear action panel
                  if (!selectedChapterEl) {
                    clearRightPanels(level2 + 1);
                  }
              
                  return;
                }
              
                // Select new chapter
                chapEl.classList.add('selected');
                selectedChapterEl = chapEl;
              
                // ⚠️ Local tracker for this specific chapter's action panel
                let currentSelectedActionEl = null;
              
                // Create Action Panel
                createPanel(actions, (actionEl, action, level3) => {
                  // Remove previous action selection
                  if (currentSelectedActionEl && currentSelectedActionEl !== actionEl) {
                    currentSelectedActionEl.classList.remove('selected');
                    
                  }
              
                  // Toggle logic
                  if (currentSelectedActionEl === actionEl) {
                    actionEl.classList.toggle('selected');
                    currentSelectedActionEl = actionEl.classList.contains('selected') ? actionEl : null;
                    return;
                  }
              
                  actionEl.classList.add('selected');
                  currentSelectedActionEl = actionEl;
                  clearRightPanels(level3 + 1);

                  // ✅ Inject content if "Video" selected
                  if (action === 'Video') {
                    const videoPanel = document.createElement('div');
                    videoPanel.className = 'min-w-[400px] bg-white p-4 rounded-xl shadow';
                    videoPanel.innerHTML = `
                      <h3 class="text-lg font-bold mb-2">${chapter} - ${action}</h3>
                      <p class="text-sm text-gray-500">[Video player placeholder]</p>
                    `;
                    expansionArea.appendChild(videoPanel);
                  }
                }, level2 + 1, true);
              }, level + 1, true, { current: selectedChapterEl });
              
            }, 0, true, { current: selectedSubjectEl });

          } else {
            clearRightPanels(0);
          }
        };

        classList.appendChild(clone);
      });
    }

    buildClassModules();
  </script>
</body>
</html>
