<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Section 7 – Footer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">

  <!-- Top Footer Grid -->
  <div class="grid grid-cols-3 gap-6 px-10 py-10">

    <!-- Left Column -->
    <div class="space-y-4 text-left">
      <p class="hover:underline cursor-pointer">Home</p>
      <p class="hover:underline cursor-pointer">About Us</p>
      <p class="hover:underline cursor-pointer">Contact Us</p>
      <p class="hover:underline cursor-pointer">Join Us</p>
    </div>

    <!-- Center Column (Social Media Icons) -->
    <div class="flex flex-col items-center space-y-4">
      <p class="hover:underline cursor-pointer">YouTube</p>
      <p class="hover:underline cursor-pointer">Instagram</p>
      <p class="hover:underline cursor-pointer">Mail</p>
      <p class="hover:underline cursor-pointer">Twitter</p>
      <p class="hover:underline cursor-pointer">LinkedIn</p>
      <p class="hover:underline cursor-pointer">Facebook</p>
    </div>

    <!-- Right Column -->
    <div class="space-y-4 text-right">
      <p>Contact: +91-XXXXXXXXXX</p>
      <p>Email: contact@vgyyan.in</p>
    </div>
  </div>

  <!-- Bottom Footer with Logo and Tagline -->
  <div class="px-10 pb-6">
    <div class="flex items-start gap-4">
      <div class="text-4xl font-bold">V</div>
      <div class="text-sm pt-2">Experience the best learning with vGYYAN – Future of Education</div>
    </div>

    <div class="mt-10 text-center text-[100px] font-extrabold tracking-wide">
      vGYYAN
    </div>

    <!-- Breakdown of acronym below big logo -->
    <div class="flex justify-center gap-8 mt-2 text-sm tracking-wider">
      <div class="text-center">
        <p class="font-bold">V</p>
        <p>Virtual</p>
      </div>
      <div class="text-center">
        <p class="font-bold">G</p>
        <p>Growth</p>
      </div>
      <div class="text-center">
        <p class="font-bold">Y</p>
        <p>Young</p>
      </div>
      <div class="text-center">
        <p class="font-bold">Y</p>
        <p>Yearners</p>
      </div>
      <div class="text-center">
        <p class="font-bold">A</p>
        <p>Aspiring</p>
      </div>
      <div class="text-center">
        <p class="font-bold">N</p>
        <p>Nation</p>
      </div>
    </div>
  </div>

</body>
</html>
