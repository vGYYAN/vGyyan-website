
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧠 vGyyan.ai</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #fefefe;
    }
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      z-index: 10;
    }
    .nav-left, .nav-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex: 1;
    }
    .nav-middle {
      flex: 0;
      font-weight: bold;
      font-size: 2rem;
      color: #222;
      text-align: center;
    }
    .nav-link {
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }
    header {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 8rem 2rem 2rem 2rem;
      box-sizing: border-box;
      background: url('your-video-placeholder.gif') no-repeat center center/cover;
    }
    .hero-left {
      max-width: 60%;
    }
    .hero-main {
      font-size: 2rem;
      font-weight: bold;
      color: #000;
      margin-bottom: 1rem;
    }
    .hero-sub {
      font-size: 3rem;
      font-weight: 600;
      color: #0077cc;
      margin-bottom: 2rem;
    }
    .floating-text {
      position: relative;
      height: 6rem;
      overflow: hidden;
      font-size: 1.2rem;
      color: #111;
    }
    .floating-text span {
      display: inline-block;
      animation: scrollUp 15s linear infinite;
      white-space: nowrap;
    }
    @keyframes scrollUp {
      0%   { transform: translateY(100%); }
      90%  { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="nav-left">
      <a class="nav-link" href="#what">What We Do</a>
      <a class="nav-link" href="#about">About Us</a>
      <a class="nav-link" href="#app">Get the App</a>
    </div>
    <div class="nav-middle">
      🧠 vGyyan.ai
    </div>
    <div class="nav-right" style="justify-content: flex-end;">
      <a class="nav-link" href="#signup">Sign Up</a>
      <a class="nav-link" href="#login">Login</a>
      <span style="cursor:pointer; font-size: 1.5rem;">&#9776;</span>
    </div>
  </div>

  <header>
    <div class="hero-left">
      <div class="hero-main">Skip outdated learning methods.</div>
      <div class="hero-sub">Step into the future of education with vGyyan.ai</div>
      <div class="floating-text">
        <span>
          Personalized learning with built-in quizzes.&nbsp;&nbsp;&nbsp;
          Track your child’s growth and academic progress.&nbsp;&nbsp;&nbsp;
          Monthly competitions, AI-generated insights, and more.&nbsp;&nbsp;&nbsp;
        </span>
      </div>
    </div>
  </header>
</body>
</html>
