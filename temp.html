<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>vGYYAN.ai Background Test</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      background-color: transparent;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      z-index: -1;
      background-color: #fdfdfd;
      background-image: 
        radial-gradient(circle at 20% 30%, #c084fc 0%, transparent 50%),   /* purple */
        radial-gradient(circle at 70% 40%, #38bdf8 0%, transparent 50%),   /* blue */
        radial-gradient(circle at 50% 80%, #fbbf24 0%, transparent 50%),   /* yellow-orange */
        radial-gradient(circle at 90% 90%, #f472b6 0%, transparent 50%);   /* pink */
      background-repeat: no-repeat;
      background-size: 150% 150%;
      animation: moveBlobs 10s ease-in-out infinite;
      opacity: 0.9;
      pointer-events: none;
    }

    @keyframes moveBlobs {
      0% {
        background-position: 20% 30%, 70% 40%, 50% 80%, 90% 90%;
      }
      50% {
        background-position: 25% 35%, 65% 45%, 55% 75%, 85% 85%;
      }
      100% {
        background-position: 20% 30%, 70% 40%, 50% 80%, 90% 90%;
      }
    }

    h1 {
      padding: 4rem;
      font-size: 2.5rem;
      color: #222;
      z-index: 1;
      position: relative;
    }
  </style>
</head>
<body>
  <h1>This is the improved background test with visible blobs</h1>
</body>
</html>
