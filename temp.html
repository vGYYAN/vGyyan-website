<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>vGYYAN.ai Animated Blobs</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      background-color: #fdfdfd;
      overflow: hidden;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      opacity: 0.4;
      filter: blur(60px);
      z-index: -1;
      animation: moveBlob 20s ease-in-out infinite alternate;
    }

    .blob1 {
      width: 400px;
      height: 400px;
      background: #c084fc; /* purple */
      top: 20%;
      left: 10%;
      animation-delay: 0s;
    }

    .blob2 {
      width: 300px;
      height: 300px;
      background: #38bdf8; /* blue */
      top: 30%;
      left: 70%;
      animation-delay: 3s;
    }

    .blob3 {
      width: 350px;
      height: 350px;
      background: #fbbf24; /* yellow-orange */
      top: 70%;
      left: 40%;
      animation-delay: 6s;
    }

    .blob4 {
      width: 250px;
      height: 250px;
      background: #f472b6; /* pink */
      top: 80%;
      left: 80%;
      animation-delay: 9s;
    }

    @keyframes moveBlob {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-30px, 20px) scale(1.1); }
      100% { transform: translate(30px, -20px) scale(0.95); }
    }

    h1 {
      position: relative;
      z-index: 1;
      padding: 4rem;
      font-size: 2.5rem;
      color: #222;
    }
  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>

  <h1>🧠 Dynamic Animated Background is Working!</h1>
</body>
</html>
