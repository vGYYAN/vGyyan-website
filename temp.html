<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vGYYAN.ai – Section 2</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fdfdfd;
      overflow-x: hidden;
    }

    .section-2 {
      padding-top: 7rem;
      background-color: #fafafa;
    }

    .poster-row {
      display: flex;
      gap: 1rem;
      white-space: nowrap;
      overflow: hidden;
      position: relative;
    }

    .poster-track {
      display: flex;
      animation: scroll-left 50s linear infinite;
    }

    .poster-row:nth-child(2) .poster-track {
      animation: scroll-right 35s linear infinite;
    }

    .poster-row:hover .poster-track {
      animation-play-state: paused;
    }

    .poster {
      position: relative;
      flex: 0 0 auto;
      height: 160px;
      aspect-ratio: 3 / 4;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .poster img {
      height: 100%;
      width: auto;
      display: block;
    }

    .poster:hover::after {
      content: attr(data-info);
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 0.85rem;
      padding: 0.3rem;
      text-align: center;
    }

    .poster-row:nth-child(2) .poster {
      height: 200px;
    }

    @keyframes scroll-left {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    @keyframes scroll-right {
      0% { transform: translateX(0); }
      100% { transform: translateX(100%); }
    }
  </style>
</head>
